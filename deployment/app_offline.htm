<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRB - Upgrading Things!</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 20px;
        }
        .icon {
            font-size: 4rem;
            animation: spin 3s linear infinite;
            display: inline-block;
        }
        h1 {
            font-size: 2.5rem;
            color: #38bdf8;
            margin-bottom: 10px;
        }
        p {
            font-size: 1.2rem;
            color: #94a3b8;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- This padding block ensures the file size easily clears the 512-byte requirement -->
        <!-- PADDING: ABCDEFGHIJKLMNOPQRSTUVWXYZABCDEFGHIJKLMNOPQRSTUVWXYZABCDEFGHIJKLMNOPQRSTUVWXYZ -->
        <div class="icon">⚙️</div>
        <h1>We're upgrading our gears!</h1>
        <p>The application is temporarily offline for a quick tune-up. We will be right back online shortly.</p>
    </div>
</body>
</html>
