name: JJS Monorepo CI/CD Build and FTP Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15 # Guard rails to save your runner minutes
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # 1. Setup .NET 10 and Publish API
    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x' # Targeting .NET 10
        
    - name: Restore .NET Dependencies
      run: dotnet restore JJS.Api/JJS.Api.csproj

    # Output files are built into a flat localized staging folder
    - name: Build and Publish .NET WebAPI
      run: dotnet publish JJS.Api/JJS.Api.csproj -c Release -o ./publish-output/api

    # 2. Setup Node.js and Build Next.js 16 UI
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22' # Recommended Node version for Next.js 16
        cache: 'npm'
        cache-dependency-path: 'jjs-web/package-lock.json'

    - name: Install Next.js Dependencies
      working-directory: jjs-web
      run: npm ci

    - name: Build Next.js UI (Static Export)
      working-directory: jjs-web
      run: npm run build

    # 3. Deploy .NET API to Server via MilanMK File Deployer
    - name: Deploy API to FTP
      uses: milanmk/actions-file-deployer@v2
      with:
        remote-protocol: "ftp"
        remote-host: ${{ secrets.FTP_SERVER }}
        remote-user: ${{ secrets.FTP_USERNAME }}
        remote-password: ${{ secrets.FTP_PASSWORD }}
        remote-port: 21
        local-path: "./publish-output/api"
        remote-path: "./publish/api"
        sync-delta: true
        # The full exclusion list is read natively as standard glob arrays
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**
          **/bin/**
          **/obj/**
          **/runtimes/**
          **/appsettings.Development.json

    # 4. Deploy Next.js UI to Server via MilanMK File Deployer
    - name: Deploy Next.js UI to FTP
      uses: milanmk/actions-file-deployer@v2
      with:
        remote-protocol: "ftp"
        remote-host: ${{ secrets.FTP_SERVER }}
        remote-user: ${{ secrets.FTP_USERNAME }}
        remote-password: ${{ secrets.FTP_PASSWORD }}
        remote-port: 21
        local-path: "./jjs-web/out"
        remote-path: "./publish/ui"
        sync-delta: true
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**
          **/.next*
          **/.next*/**
