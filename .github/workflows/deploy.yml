name: JJS Monorepo CI/CD Build and FTP Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15 # Guard rails to prevent wasted action runner minutes
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # 1. Setup .NET 10 and Publish API
    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x' # Targeting .NET 10
        
    - name: Restore .NET Dependencies
      run: dotnet restore JJS.Api/JJS.Api.csproj

    - name: Build and Publish .NET WebAPI
      run: dotnet publish JJS.Api/JJS.Api.csproj -c Release -o ./publish-output/api

    # 2. Setup Node.js and Build Next.js 16 UI
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22' # Recommended Node version for Next.js 16
        cache: 'npm'
        cache-dependency-path: 'jjs-web/package-lock.json'

    - name: Install Next.js Dependencies
      working-directory: jjs-web
      run: npm ci

    - name: Build Next.js UI (Static Export)
      working-directory: jjs-web
      run: npm run build

    # 3. Deploy .NET API to Server via FTP Upload Action
    - name: Deploy API to FTP
      uses: Nanceal/ftp-upload-action@v1.0.0
      with:
        host: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        port: 21
        secure: false # Set to true if your host requires explicit FTPS
        local-dir: ./publish-output/api
        remote-dir: ./publish/api
        # Full exclusions array processed cleanly as native globs
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**
          **/bin/**
          **/obj/**
          **/runtimes/**
          **/appsettings.Development.json

    # 4. Deploy Next.js UI to Server via FTP Upload Action
    - name: Deploy Next.js UI to FTP
      uses: Nanceal/ftp-upload-action@v1.0.0
      with:
        host: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        port: 21
        secure: false
        local-dir: ./jjs-web/out
        remote-dir: ./publish/ui
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**
          **/.next*
          **/.next*/**
