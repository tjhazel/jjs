name: JJS Monorepo CI/CD Build and FTP Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30 # Increased - self-contained win-x64 publish and FTP upload are large

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # 1. Setup .NET 10 and Publish API
    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x' # Targeting .NET 10

    - name: Restore .NET Dependencies
      run: dotnet restore JJS.Api/JJS.Api.csproj

    - name: Build and Publish .NET WebAPI
      run: dotnet publish JJS.Api/JJS.Api.csproj -c Release -r win-x86 -o ./publish-output/api
   #   run: dotnet publish JJS.Api/JJS.Api.csproj -c Release -r win-x64 --self-contained true -o ./publish-output/api

    # 2. Setup Node.js and Build Next.js 16 UI
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22' # Recommended Node version for Next.js 16
        cache: 'npm'
        cache-dependency-path: 'jjs-web/package-lock.json'

    - name: Install Next.js Dependencies
      working-directory: jjs-web
      run: npm ci

    - name: Build Next.js UI (Static Export)
      working-directory: jjs-web
      run: npm run build

    # 3. Shut down the application to release file locks safely
    - name: Put App Offline
      uses: SamKirkland/FTP-Deploy-Action@v4.4.0
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        protocol: ftp
        server-dir: ./api/     
        local-dir: ./deployment/
        exclude: |
          **
          !**/app_offline.htm

    # 3.5 Wait for IIS Worker Process to release file handles
    - name: Sleep for 10 seconds
      run: sleep 10

    # 4. Deploy .NET API to Server via FTP (Excluding configs)
    - name: Deploy API to the server via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.4.0
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        protocol: ftp
        timeout: 900000
        log-level: verbose
        server-dir: ./api/
        local-dir: ./publish-output/api/
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**
          **/appsettings*.json

    # # 5. Deploy ONLY target .NET config files via FTP -> do not deploy prod file, it will override server settings -> !**/appsettings.Production.json
    # - name: Deploy API config files via FTP
    #   uses: SamKirkland/FTP-Deploy-Action@v4.4.0
    #   with:
    #     server: ${{ secrets.FTP_SERVER }}
    #     username: ${{ secrets.FTP_USERNAME }}
    #     password: ${{ secrets.FTP_PASSWORD }}
    #     protocol: ftp
    #     timeout: 900000
    #     log-level: verbose
    #     server-dir: ./api/ 
    #     local-dir: ./publish-output/api
    #     exclude: |
    #       **
    #       !**/appsettings.json

    # 6. Deploy Next.js UI to Server via FTP
    - name: Deploy Next.js UI to FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.4.0
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        protocol: ftp
        timeout: 900000
        log-level: verbose
        server-dir: ./ui/
        local-dir: ./jjs-web/out/
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**
          **/.next*
          **/.next*/**

    # # 7. Upload app_online.htm and allow it to delete app_offline.htm inside /api/
    - name: Bring IIS App Back Online
      uses: SamKirkland/FTP-Deploy-Action@v4.4.0
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        protocol: ftp
        server-dir: ./api/     
        local-dir: ./deployment/
        exclude: |
          **
          !**/app_online.htm   # Keeps app_online.htm and deletes app_offline.htm [1]