name: JJS Monorepo CI/CD Build and FTP Deploy
on:
  push:
    branches: [ "develop" ] #[ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30 
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # 1. Setup .NET 10 and Publish API
    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'  # Targeting .NET 10

    - name: Restore .NET Dependencies
      run: dotnet restore JJS.Api/JJS.Api.csproj

    - name: Build and Publish .NET WebAPI
      run: dotnet publish JJS.Api/JJS.Api.csproj -c Release -r win-x86 -o ./publish-output/api

    # 2. Setup Node.js and Build Vite UI
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22' # Kept on Node 22 to avoid the Node 20 deprecation warning
        cache: 'npm'
        cache-dependency-path: 'jjs-web/package-lock.json' 

    - name: Install npm Dependencies
      # FIX: Change working directory to your new Vite folder name (assuming 'ui')
      working-directory: jjs-web 
      run: npm ci

    - name: Build UI (Vite Static Production Build)
      # FIX: Change working directory to your new Vite folder name
      working-directory: jjs-web 
      run: npm run winhost

    # 3. Shut down the application to release file locks safely
    - name: Put App Offline
      uses: SamKirkland/FTP-Deploy-Action@v4.4.0
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        protocol: ftp
        server-dir: ./
        local-dir: ./deployment/
        exclude: |
          **
          !**/app_offline.htm

    # 3.5 Wait for IIS Worker Process to release file handles
    - name: Sleep for 10 seconds
      run: sleep 10

    # 4. Deploy .NET API to Server via FTP (Excluding configs)
    - name: Deploy API to the server via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.4.0
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        protocol: ftp
        timeout: 900000
        log-level: verbose
        server-dir: ./
        local-dir: ./publish-output/api/
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**
          **/appsettings*.json

    # 6. Deploy Vite UI to Server via FTP
    - name: Deploy Vite UI to FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.4.0
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        protocol: ftp
        timeout: 900000
        log-level: verbose
        server-dir: ./ui/
        # FIX: Vite outputs static files to 'dist' folder instead of Next.js 'out'
        local-dir: ./jjs-web/dist/ 
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**

    # 7. Upload app_online.htm and allow it to delete app_offline.htm
    - name: Bring IIS App Back Online
      uses: SamKirkland/FTP-Deploy-Action@v4.4.0
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        protocol: ftp
        server-dir: ./
        local-dir: ./deployment/
        exclude: |
          **
          !**/app_online.htm
