name: JJS Monorepo CI/CD Build and FTP Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # 1. Setup .NET 10 and Publish API
    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x' # Targeting .NET 10
    
    - name: Restore .NET Dependencies
      run: dotnet restore JJS.Api/JJS.Api.csproj

    - name: Build and Publish .NET WebAPI
      run: dotnet publish JJS.Api/JJS.Api.csproj -c Release -o ./publish-output/api

    # 2. Setup Node.js and Build Next.js 16 UI
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22' # Recommended Node version for Next.js 16
        cache: 'npm'
        cache-dependency-path: 'jjs-web/package-lock.json'

    - name: Install Next.js Dependencies
      working-directory: jjs-web
      run: npm ci

    - name: Build Next.js UI (Static Export)
      working-directory: jjs-web
      run: npm run build

    # 3. Deploy .NET API to Server via FTP
    - name: Deploy API to FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.4.0
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        protocol: ftps
        port: 21
        security: loose
        timeout: 900000
        log-level: verbose
        server-dir: ./publish/api/
        local-dir: ./publish-output/api/
        exclude: |
          **/runtimes/**

    # 4. Deploy Next.js UI to Server via FTP
    - name: Deploy Next.js UI to FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.4.0
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        protocol: ftps
        port: 21
        security: loose
        timeout: 900000
        log-level: verbose
        server-dir: ./publish/ui/
        local-dir: ./jjs-web/out/
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**
          **/.next*
          **/.next*/**

