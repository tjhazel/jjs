name: JJS Monorepo CI/CD Build and FTP Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15 # Failsafe to protect your GitHub runner minutes
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # 1. Setup .NET 10 and Publish API
    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x' # Targeting .NET 10
        
    - name: Restore .NET Dependencies
      run: dotnet restore JJS.Api/JJS.Api.csproj

    - name: Build and Publish .NET WebAPI
      run: dotnet publish JJS.Api/JJS.Api.csproj -c Release -o ./publish-output/api

    # 2. Setup Node.js and Build Next.js 16 UI
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22' # Recommended Node version for Next.js 16
        cache: 'npm'
        cache-dependency-path: 'jjs-web/package-lock.json'

    - name: Install Next.js Dependencies
      working-directory: jjs-web
      run: npm ci

    - name: Build Next.js UI (Static Export)
      working-directory: jjs-web
      run: npm run build

    # 3. Deploy .NET API to Server via FTP
    - name: Deploy API to FTP
      uses: wlixcc/SFTP-Deploy-Action@v1.2.4
      with:
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        server: ${{ secrets.FTP_SERVER }}
        port: 21
        protocol: ftp # Uses regular FTP to avoid the previous handshake hangs
        local_path: './publish-output/api/*'
        remote_path: './publish/api'
        args: '-o ConnectTimeout=10'
        # The full exclusion list is restored here using standard glob patterns
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**
          **/bin/**
          **/obj/**
          **/runtimes/**
          **/appsettings.Development.json

    # 4. Deploy Next.js UI to Server via FTP
    - name: Deploy Next.js UI to FTP
      uses: wlixcc/SFTP-Deploy-Action@v1.2.4
      with:
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        server: ${{ secrets.FTP_SERVER }}
        port: 21
        protocol: ftp
        local_path: './jjs-web/out/*'
        remote_path: './publish/ui'
        args: '-o ConnectTimeout=10'
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**
          **/.next*
          **/.next*/**
